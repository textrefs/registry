key: bible-book-chapter-verse
preferred_label: Bible book-chapter-verse (OSIS)
description: >-
  OSIS locator: `Book.Chapter.Verse`. The canonical book vocabulary is the
  OSIS book abbreviation list (CrossWire), case-sensitive as published there
  — e.g. `Gen`, `Exod`, `Matt`, `John`, `1Cor`. Chapter and verse are
  positive integers without leading zeros. Both the Hebrew Bible and the
  New Testament cite with this grammar.
locator_regex: '^(?<book>[1-4]?[A-Za-z][A-Za-z0-9]*)\.(?<chapter>[1-9][0-9]*)\.(?<verse>[1-9][0-9]*)$'
status: draft
