key: homer-book-line
preferred_label: Homeric book-line
normalization_version: 1.0.0
# Both the Iliad and the Odyssey are conventionally divided into 24 books;
# lines are cited within each book.
locator_regex: '^(?<book>[1-9]|1[0-9]|2[0-4])\.(?<line>[1-9][0-9]*)$'
examples:
  valid:
    - '1.1'
    - '24.804'
    - '12.453'
  invalid:
    - '0.1'
    - '25.1'
    - '1.0'
    - '1'
status: candidate
created: 2026-05-31
modified: 2026-05-31
