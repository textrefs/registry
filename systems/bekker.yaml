key: bekker
preferred_label: Bekker numbering (Aristotelian corpus)
description: >-
  Bekker numbering: page, column (a or b), and line, after August Immanuel
  Bekker's 1831 Berlin edition. Pages span the whole corpus from 1 (Categories
  1a1) to roughly 1462. Canonical form: page and line are positive integers
  without leading zeros; the column letter is lowercase.
locator_regex: '^(?<page>[1-9][0-9]{0,3})(?<column>[ab])(?<line>[1-9][0-9]?)$'
status: draft
created: 2026-05-31
modified: 2026-07-05
