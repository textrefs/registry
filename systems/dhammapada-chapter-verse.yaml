key: dhammapada-chapter-verse
preferred_label: Dhammapada chapter-and-verse
description: >-
  Dhammapada cited by chapter and verse (`chapter.verse`), e.g. 1.1 through
  26.41, following the standard Pali Text Society numbering of 423 verses
  in 26 chapters.
# Named capture groups expose `{chapter}` and `{verse}` to URL templates.
# Compiler also exposes zero-padded variants (`{chapter02}`, `{chapter03}`,
# `{chapter04}`, `{verse02}`, `{verse03}`) and Roman-numeral chapters
# (`{chapterRoman}`, e.g. `I`, `VIII`, `XXVI`). Because `chapter_sizes`
# is declared below, the compiler also emits `{verseGlobal}` — the
# cumulative 1..423 verse counter used by single-page resolvers.
locator_regex: '^(?<chapter>[1-9]|1[0-9]|2[0-6])\.(?<verse>[1-9][0-9]*)$'
# Müller (1881) / standard PTS per-chapter verse counts. Sum = 423.
chapter_sizes:
