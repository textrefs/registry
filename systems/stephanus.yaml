key: stephanus
preferred_label: Stephanus pagination (Platonic corpus)
description: >-
  Stephanus pagination: page, section (a–e), and optional sub-line, after
  Henri Estienne's 1578 edition of Plato's works.
locator_regex: '^(?<page>[0-9]{1,4})(?<section>[a-e])(?<sub>[0-9]{1,2})?$'
