# URL templates use RFC 6570 Level 1 expansion with variables drawn from
# the citation system's named capture groups (`chapter`, `verse`) plus
# compiler-derived variants:
#   - zero-padded: `chapter02`, `chapter03`, `chapter04`
#   - Roman:       `chapterRoman` (e.g. `I`, `VIII`, `XXVI`)
#   - cumulative:  `verseGlobal` (1..423, derived from system `chapter_sizes`)
# Providers whose URLs don't fit a template use a per-chapter URL map (`url_by.chapter`).
resolvers:
  - provider: Project Gutenberg
    edition: 'Müller (1881), Gutenberg ebook #2017'
    language: en
    access: open
    license_url: 'https://www.gutenberg.org/policy/license.html'
    # Single-page text; per-chapter anchors `#link2HCH0001` … `#link2HCH0026`.
    # No verse anchors available — resolves to chapter level only.
    url: 'https://www.gutenberg.org/files/2017/2017-h/2017-h.htm#link2HCH{chapter04}'
    last_checked: '2026-06-03'

  # Wikisource hosts the Müller (1881) translation but with a 25-chapter division
  # (canonical chapters XXV+XXVI merged into XXV); verse-level anchors use a global
  # 1..423 counter (e.g. `#XIII:167`, `#XXV:423`). Because chapter 26 references
  # can't be expressed in that scheme, no Wikisource resolver is wired up here.

  - provider: ancient-buddhist-texts.net
    edition: 'Anandajoti Bhikkhu translation'
    language: en
    access: open
    # Separate file per chapter, named `{NN}-{Topic}.htm`; topic slugs are
    # not derivable from chapter numbers, so each is listed explicitly.
    # No verse anchors — resolves to chapter level only.
    last_checked: '2026-06-03'
    url_by:
      chapter:
